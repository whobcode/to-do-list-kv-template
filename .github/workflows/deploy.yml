name: Deploy to Cloudflare

# Scaffolded by the Worker↔GitHub connection pass.
# The deploy steps are GATED on the CLOUDFLARE_API_TOKEN secret: until that
# secret is configured, this workflow runs green and no-ops (no deploy).
# Once the secret is added it deploys the Worker via `wrangler deploy`.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Check for deploy secret
        id: gate
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLOUDFLARE_API_TOKEN not set yet — workflow scaffolded, skipping deploy. Add the secret to activate."
          fi

      - name: Checkout
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.gate.outputs.enabled == 'true'
        run: |
          if [ -f package-lock.json ]; then npm ci || npm install;
          elif [ -f package.json ]; then npm install;
          else echo "No package.json — skipping install"; fi

      - name: Build (if a build script exists)
        if: steps.gate.outputs.enabled == 'true'
        run: |
          if [ -f package.json ] && node -e "process.exit(require('./package.json').scripts?.build?0:1)"; then
            npm run build
          else
            echo "No build script — skipping build"
          fi

      - name: Deploy to Cloudflare (with retry)
        if: steps.gate.outputs.enabled == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for attempt in 1 2 3; do
            echo "::group::Deploy attempt $attempt"
            if npx --yes wrangler@latest deploy; then
              echo "::endgroup::"; echo "Deploy succeeded on attempt $attempt"; exit 0
            fi
            echo "::endgroup::"; echo "Attempt $attempt failed; retrying in 15s..."; sleep 15
          done
          echo "All deploy attempts failed"; exit 1
